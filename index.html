<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Library</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>&#123;&#125; Prompt Library</h1>
    <p>Save and manage your AI prompts</p>
  </header>

  <main>
    <section class="form-section">
      <h2>New Prompt</h2>
      <form id="prompt-form">
        <div class="field">
          <label for="title">Title</label>
          <input type="text" id="title" placeholder="e.g. Refactor function" required />
        </div>
        <div class="field">
          <label for="content">Prompt Content</label>
          <textarea id="content" rows="5" placeholder="Enter your prompt here..." required></textarea>
        </div>
        <button type="submit">Save Prompt</button>
      </form>
    </section>

    <section class="library-section">
      <h2>Saved Prompts <span id="count"></span></h2>
      <div id="prompt-grid" class="prompt-grid"></div>
      <p id="empty-state" class="empty-state">No prompts saved yet. Add one above.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
