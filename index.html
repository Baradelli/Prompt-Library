<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Library</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: #64748b;
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    textarea {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.95rem;
      padding: 0.65rem 0.9rem;
      transition: border-color 0.15s;
      outline: none;
      font-family: inherit;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: #818cf8;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: linear-gradient(135deg, #818cf8, #c084fc);
      color: #fff;
    }

    .btn-primary:hover { opacity: 0.9; }

    .btn-danger {
      background: transparent;
      border: 1px solid #3d1f1f;
      color: #f87171;
      padding: 0.35rem 0.75rem;
      font-size: 0.8rem;
    }

    .btn-danger:hover {
      background: #3d1f1f;
    }

    /* Prompt list */
    #empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #475569;
    }

    #empty-state svg {
      margin-bottom: 1rem;
      opacity: 0.4;
    }

    #empty-state p {
      font-size: 0.95rem;
    }

    .prompt-card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      transition: border-color 0.15s;
    }

    .prompt-card:hover {
      border-color: #4a5180;
    }

    .prompt-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    .prompt-card-title {
      font-size: 1rem;
      font-weight: 600;
      color: #c4b5fd;
    }

    .prompt-card-date {
      font-size: 0.75rem;
      color: #475569;
      white-space: nowrap;
      margin-top: 0.15rem;
    }

    .prompt-card-content {
      font-size: 0.9rem;
      color: #94a3b8;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .prompt-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid #2d3148;
    }

    .copy-btn {
      background: transparent;
      border: 1px solid #2d3148;
      border-radius: 6px;
      color: #64748b;
      font-size: 0.8rem;
      padding: 0.3rem 0.65rem;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .copy-btn:hover {
      border-color: #818cf8;
      color: #818cf8;
    }

    .copy-btn.copied {
      border-color: #34d399;
      color: #34d399;
    }

    #prompt-count {
      font-size: 0.8rem;
      color: #475569;
    }

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .list-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Prompt Library</h1>
      <p>Save, organize, and reuse your best prompts.</p>
    </header>

    <div class="card">
      <h2>New Prompt</h2>
      <div class="form-group">
        <label for="prompt-title">Title</label>
        <input type="text" id="prompt-title" placeholder="e.g. Summarize an article" />
      </div>
      <div class="form-group">
        <label for="prompt-content">Prompt</label>
        <textarea id="prompt-content" placeholder="Write your prompt here…"></textarea>
      </div>
      <button class="btn btn-primary" onclick="savePrompt()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save Prompt
      </button>
    </div>

    <div class="list-header">
      <h2>Saved Prompts</h2>
      <span id="prompt-count"></span>
    </div>

    <div id="prompt-list"></div>
  </div>

  <script>
    const STORAGE_KEY = 'prompt-library';

    function loadPrompts() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function savePrompts(prompts) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(prompts));
    }

    function savePrompt() {
      const title = document.getElementById('prompt-title').value.trim();
      const content = document.getElementById('prompt-content').value.trim();

      if (!title || !content) {
        const missing = !title ? 'prompt-title' : 'prompt-content';
        const el = document.getElementById(missing);
        el.style.borderColor = '#f87171';
        el.focus();
        setTimeout(() => el.style.borderColor = '', 1500);
        return;
      }

      const prompts = loadPrompts();
      prompts.unshift({
        id: crypto.randomUUID(),
        title,
        content,
        createdAt: new Date().toISOString(),
      });
      savePrompts(prompts);

      document.getElementById('prompt-title').value = '';
      document.getElementById('prompt-content').value = '';

      renderPrompts();
    }

    function deletePrompt(id) {
      const prompts = loadPrompts().filter(p => p.id !== id);
      savePrompts(prompts);
      renderPrompts();
    }

    function copyPrompt(id, btn) {
      const prompts = loadPrompts();
      const prompt = prompts.find(p => p.id === id);
      if (!prompt) return;

      navigator.clipboard.writeText(prompt.content).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 1500);
      });
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString(undefined, {
        month: 'short', day: 'numeric', year: 'numeric'
      });
    }

    function renderPrompts() {
      const prompts = loadPrompts();
      const list = document.getElementById('prompt-list');
      const count = document.getElementById('prompt-count');

      count.textContent = prompts.length
        ? `${prompts.length} prompt${prompts.length === 1 ? '' : 's'}`
        : '';

      if (prompts.length === 0) {
        list.innerHTML = `
          <div id="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
            <p>No prompts yet. Save your first one above.</p>
          </div>`;
        return;
      }

      list.innerHTML = prompts.map(p => `
        <div class="prompt-card">
          <div class="prompt-card-header">
            <div>
              <div class="prompt-card-title">${escapeHtml(p.title)}</div>
              <div class="prompt-card-date">${formatDate(p.createdAt)}</div>
            </div>
            <button class="btn btn-danger" onclick="deletePrompt('${p.id}')">Delete</button>
          </div>
          <div class="prompt-card-content">${escapeHtml(p.content)}</div>
          <div class="prompt-card-footer">
            <span style="font-size:0.8rem;color:#475569">${p.content.length} chars</span>
            <button class="copy-btn" onclick="copyPrompt('${p.id}', this)">Copy</button>
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Allow Ctrl+Enter to save
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') savePrompt();
    });

    renderPrompts();
  </script>
</body>
</html>
